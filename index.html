<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Valuator Finance | AI Appraiser</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 flex flex-col items-center">
    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-2xl border-t-4 border-orange-500">
        <h1 class="text-3xl font-bold text-center mb-6 text-gray-800 italic">₿ VALUATOR</h1>
        
        <div id="keyBox" class="mb-6 p-4 bg-orange-50 rounded-lg border border-orange-200">
            <label class="block text-sm font-semibold mb-2 text-orange-800 italic">Enter Gemini API Key:</label>
            <input type="password" id="apiKey" class="w-full p-2 border rounded focus:outline-none focus:ring-2 focus:ring-orange-500" placeholder="Paste key here...">
        </div>

        <div class="space-y-4">
            <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-orange-50 file:text-orange-700 hover:file:bg-orange-100">
            <button onclick="startAppraisal()" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl transition">Analyze Asset</button>
            <div id="output" class="mt-6 p-4 bg-gray-50 rounded-lg min-h-[100px] text-gray-700 border italic whitespace-pre-wrap">Results will appear here...</div>
        </div>
    </div>

    <script>
        async function getBTCPrice() {
            try {
                const response = await fetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
                const data = await response.json();
                return parseFloat(data.data.amount);
            } catch (error) {
                console.error("Error fetching BTC price:", error);
                return null;
            }
        }

        async function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result.split(',')[1]);
                reader.onerror = error => reject(error);
            });
        }

        async function startAppraisal() {
            const key = document.getElementById('apiKey').value;
            const imageInput = document.getElementById('imageInput');
            const output = document.getElementById('output');

            if (!key) return alert("Please enter an API key first.");
            if (!imageInput.files || imageInput.files.length === 0) return alert("Please select an image to analyze.");

            output.innerText = "Connecting to the blockchain and analyzing asset...";

            try {
                const btcPrice = await getBTCPrice();
                if (!btcPrice) throw new Error("Could not fetch Bitcoin price.");

                const base64Image = await fileToBase64(imageInput.files[0]);
                const mimeType = imageInput.files[0].type;

                // Explicitly using the stable v1 API endpoint
                const apiUrl = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${key}`;

                const response = await fetch(apiUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: `Identify this asset. Estimate its market value in USD. Convert that to BTC using the rate: 1 BTC = $${btcPrice.toLocaleString()}. Provide a professional appraisal summary.` },
                                {
                                    inline_data: {
                                        mime_type: mimeType,
                                        data: base64Image
                                    }
                                }
                            ]
                        }]
                    })
                });

                const result = await response.json();
                
                if (result.error) {
                    throw new Error(result.error.message);
                }

                if (result.candidates && result.candidates[0].content) {
                    output.innerText = result.candidates[0].content.parts[0].text;
                } else {
                    throw new Error("The AI could not provide an appraisal for this image.");
                }

            } catch (error) {
                output.innerText = "Appraisal Failed: " + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
